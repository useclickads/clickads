version: "3.9"
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-novabuilder}"
      POSTGRES_USER: "${POSTGRES_USER:-novabuilder}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-novabuilder}"
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
  mailhog:
    image: mailhog/mailhog:latest
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
volumes:
  db-data:
